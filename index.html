<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Retirada - PDA</title>
    <!-- Tailwind CSS para estilização moderna e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca HTML5-QRCode para ler o código pela câmera -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        /* Ajuste para o leitor de QR Code se adaptar a telas menores */
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 0.5rem; overflow: hidden; }
        #reader video { object-fit: cover; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 sm:p-8">
        <div class="text-center mb-6">
            <div class="bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fa-solid fa-mobile-screen-button text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Retirada de PDA</h1>
            <p class="text-gray-500 text-sm mt-1">Registre o uso lendo o QR Code do aparelho.</p>
        </div>

        <form id="pdaForm" class="space-y-5" onsubmit="event.preventDefault(); submitData();">
            
            <!-- Input: Nome do Colaborador -->
            <div>
                <label for="colaborador" class="block text-sm font-medium text-gray-700 mb-1">Nome do Colaborador *</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="colaborador" required placeholder="Digite seu nome completo"
                        class="pl-10 w-full rounded-lg border border-gray-300 px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
                </div>
            </div>

            <!-- Área do Scanner QR Code -->
            <div class="border-t border-b border-gray-100 py-4 my-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Identificação do PDA *</label>
                
                <div id="scanner-container" class="mb-3 hidden">
                    <div id="reader"></div>
                    <button type="button" onclick="stopScanner()" class="mt-2 w-full text-sm text-red-600 hover:text-red-800 font-medium">
                        Cancelar Leitura
                    </button>
                </div>

                <div class="flex gap-2">
                    <button type="button" onclick="startScanner()" id="btn-scan"
                        class="flex-1 bg-gray-800 hover:bg-gray-900 text-white px-4 py-2.5 rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-qrcode"></i> Ler QR Code
                    </button>
                    <input type="text" id="pda-number" required readonly placeholder="Nº do PDA"
                        class="flex-1 rounded-lg border border-gray-300 bg-gray-50 px-3 py-2.5 text-center font-bold text-blue-700 focus:outline-none">
                </div>
            </div>

            <!-- Status de Localização -->
            <div>
                <div class="flex items-center justify-between text-sm mb-1">
                    <span class="font-medium text-gray-700">Geolocalização</span>
                    <span id="geo-status" class="text-amber-500 font-medium"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i> Aguardando...</span>
                </div>
                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">
                <p class="text-xs text-gray-500" id="geo-details">A localização será capturada automaticamente.</p>
            </div>

            <!-- Mensagem de Feedback -->
            <div id="feedback-msg" class="hidden p-3 rounded-lg text-sm font-medium text-center"></div>

            <!-- Botão Submit -->
            <button type="submit" id="btn-submit" disabled
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white rounded-lg px-4 py-3 font-bold transition-colors flex items-center justify-center gap-2 shadow-md">
                <i class="fa-solid fa-cloud-arrow-up"></i> Registrar Retirada
            </button>
        </form>
    </div>

    <script>
        // ======== CONFIGURAÇÃO IMPORTANTE ========
        // Substitua a URL abaixo pela URL que o Google Apps Script vai te gerar (Instruções no chat)
        const GOOGLE_SCRIPT_WEB_APP_URL = "COLE_AQUI_A_URL_DO_SEU_WEB_APP";
        // =========================================

        let html5QrcodeScanner;
        let isGettingLocation = false;

        // Inicializar captura de localização assim que a página carregar
        window.onload = function() {
            getLocation();
        };

        // Função para iniciar o leitor de QR Code
        function startScanner() {
            document.getElementById('scanner-container').classList.remove('hidden');
            document.getElementById('btn-scan').classList.add('hidden');
            
            // Inicializa o leitor
            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
                .catch(err => {
                    alert("Erro ao acessar a câmera. Verifique as permissões do navegador.");
                    stopScanner();
                });
        }

        // Função chamada quando o QR Code é lido com sucesso
        function onScanSuccess(decodedText, decodedResult) {
            // Toca um som de bipe curto
            playBeep();
            
            // Preenche o campo com o valor lido do QR Code (ex: "PDA-001")
            document.getElementById('pda-number').value = decodedText;
            
            // Para o scanner
            stopScanner();
            checkFormValidity();
        }

        // Ignorar falhas de leitura a cada frame (normal)
        function onScanFailure(error) { /* não fazer nada */ }

        // Parar o leitor e esconder a câmera
        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                }).catch(err => console.log(err));
            }
            document.getElementById('scanner-container').classList.add('hidden');
            document.getElementById('btn-scan').classList.remove('hidden');
        }

        // Capturar GPS
        function getLocation() {
            const statusLabel = document.getElementById('geo-status');
            const detailsLabel = document.getElementById('geo-details');

            if (!navigator.geolocation) {
                statusLabel.innerHTML = "<span class='text-red-500'><i class='fa-solid fa-triangle-exclamation'></i> GPS não suportado</span>";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                // Sucesso
                (position) => {
                    document.getElementById('latitude').value = position.coords.latitude;
                    document.getElementById('longitude').value = position.coords.longitude;
                    statusLabel.innerHTML = "<span class='text-green-600'><i class='fa-solid fa-check-circle'></i> Localizado</span>";
                    detailsLabel.innerText = `Lat: ${position.coords.latitude.toFixed(4)}, Lng: ${position.coords.longitude.toFixed(4)}`;
                    checkFormValidity();
                },
                // Erro
                (error) => {
                    statusLabel.innerHTML = "<span class='text-red-500'><i class='fa-solid fa-triangle-exclamation'></i> Erro no GPS</span>";
                    detailsLabel.innerText = "Por favor, ative a localização do seu navegador/celular.";
                    console.warn(`ERRO GPS(${error.code}): ${error.message}`);
                },
                // Opções
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // Verifica se podemos habilitar o botão de envio (Nome, PDA e GPS preenchidos)
        function checkFormValidity() {
            const nome = document.getElementById('colaborador').value;
            const pda = document.getElementById('pda-number').value;
            const lat = document.getElementById('latitude').value;
            
            const btn = document.getElementById('btn-submit');
            if (nome && pda && lat) {
                btn.removeAttribute('disabled');
            } else {
                btn.setAttribute('disabled', 'true');
            }
        }

        // Ouve a digitação no nome para checar validade
        document.getElementById('colaborador').addEventListener('input', checkFormValidity);

        // Enviar dados para o Google Sheets
        function submitData() {
            const btnSubmit = document.getElementById('btn-submit');
            const feedback = document.getElementById('feedback-msg');
            
            // Validar URL do Script
            if(GOOGLE_SCRIPT_WEB_APP_URL.includes("COLE_AQUI")) {
                showFeedback("Erro: URL do Google Apps Script não configurada no código HTML.", "error");
                return;
            }

            // Preparar botão (loading state)
            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registrando...';
            btnSubmit.setAttribute('disabled', 'true');
            feedback.classList.add('hidden');

            // Pegar data e hora local
            const dataAtual = new Date();
            const dataFormatada = dataAtual.toLocaleDateString('pt-BR');
            const horaFormatada = dataAtual.toLocaleTimeString('pt-BR');

            // Montar objeto que será enviado ao Sheets
            const payload = {
                data: dataFormatada,
                hora: horaFormatada,
                nome: document.getElementById('colaborador').value,
                pda: document.getElementById('pda-number').value,
                latitude: document.getElementById('latitude').value,
                longitude: document.getElementById('longitude').value,
                googleMapsLink: `https://www.google.com/maps?q=${document.getElementById('latitude').value},${document.getElementById('longitude').value}`
            };

            // Fazer a requisição POST
            fetch(GOOGLE_SCRIPT_WEB_APP_URL, {
                method: 'POST',
                // Usa text/plain para evitar bloqueio de CORS (Preflight) padrão do navegador
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    showFeedback("✅ Retirada registrada com sucesso!", "success");
                    // Limpar formulário para o próximo
                    document.getElementById('colaborador').value = '';
                    document.getElementById('pda-number').value = '';
                    checkFormValidity();
                } else {
                    throw new Error("Erro no servidor Google.");
                }
            })
            .catch(error => {
                console.error("Erro:", error);
                showFeedback("❌ Ocorreu um erro ao enviar os dados. Tente novamente.", "error");
            })
            .finally(() => {
                // Restaurar botão
                btnSubmit.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Registrar Retirada';
            });
        }

        // Exibe mensagem de erro ou sucesso
        function showFeedback(msg, type) {
            const feedback = document.getElementById('feedback-msg');
            feedback.textContent = msg;
            feedback.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            
            if(type === 'success') {
                feedback.classList.add('bg-green-100', 'text-green-800');
            } else {
                feedback.classList.add('bg-red-100', 'text-red-800');
            }
        }

        // Bipe sonoro suave ao ler o QR Code
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.value = 800; // hz
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                setTimeout(() => oscillator.stop(), 100);
            } catch(e) { console.log("Áudio não suportado"); }
        }
    </script>
</body>
</html>
