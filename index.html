<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoramento PDA - Firestore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { background-color: #f8fafc; }
        #qr-reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .hide { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 flex justify-center items-center min-h-screen">

    <!-- TELA REGISTRO -->
    <div id="view-registro" class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-sm border border-slate-100">
        <button onclick="window.abrirAdmin()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-500"><i class="fa-solid fa-gear"></i></button>
        <div class="text-center mb-8">
            <div class="bg-indigo-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-200">
                <i class="fa-solid fa-tablet-screen-button text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">Controle de PDA</h1>
        </div>

        <div class="space-y-5">
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button id="btn-retirada" onclick="window.selecionarTipo('Retirada')" class="flex-1 py-2 rounded-lg font-bold bg-white text-indigo-600 shadow-sm transition">Retirada</button>
                <button id="btn-devolucao" onclick="window.selecionarTipo('Devolução')" class="flex-1 py-2 rounded-lg font-bold text-slate-500 transition">Devolução</button>
            </div>
            <input type="text" id="nome" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200" placeholder="Seu nome completo">
            <button onclick="window.iniciarLeituraQR()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-qrcode"></i> Ler QR Code PDA
            </button>
            <p id="pda-selecionado" class="text-center text-sm font-bold text-slate-600">Nenhum PDA selecionado</p>
            <button id="btn-submit" onclick="window.enviarDados()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-lg hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">Confirmar</button>
        </div>
    </div>

    <!-- TELA ADMIN -->
    <div id="view-dashboard" class="bg-white rounded-3xl shadow-xl p-6 w-full max-w-4xl hide" style="height: 90vh;">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-slate-800">Monitoramento</h2>
            <button onclick="window.sairAdmin()" class="px-4 py-2 bg-slate-100 rounded-lg text-sm font-bold text-slate-600">Sair</button>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-slate-50 p-4 rounded-2xl border">
                <div class="text-xs font-bold text-slate-400 uppercase">Hoje</div>
                <div id="stat-total" class="text-2xl font-black text-slate-800">0</div>
            </div>
            <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                <div class="text-xs font-bold text-indigo-400 uppercase">Retiradas</div>
                <div id="stat-retiradas" class="text-2xl font-black text-indigo-800">0</div>
            </div>
            <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                <div class="text-xs font-bold text-emerald-400 uppercase">Devoluções</div>
                <div id="stat-devolucoes" class="text-2xl font-black text-emerald-800">0</div>
            </div>
            <div class="bg-rose-50 p-4 rounded-2xl border border-rose-100">
                <div class="text-xs font-bold text-rose-400 uppercase">Pendentes</div>
                <div id="stat-pendentes" class="text-2xl font-black text-rose-800">0</div>
            </div>
        </div>

        <div class="flex gap-2 mb-4">
            <select id="filtro" onchange="window.renderizarTabela()" class="bg-slate-100 px-4 py-2 rounded-lg text-sm font-bold">
                <option value="todos">Todos</option>
                <option value="hoje">Hoje</option>
                <option value="pendentes">Pendentes de Devolução</option>
            </select>
        </div>

        <div class="overflow-y-auto h-2/3 custom-scroll border rounded-xl">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-50 sticky top-0">
                    <tr><th class="p-3">Data/Hora</th><th class="p-3">Colaborador</th><th class="p-3">PDA</th><th class="p-3">Status</th></tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <!-- QR OVERLAY -->
    <div id="qr-reader-overlay"><div id="qr-reader" class="w-72 h-72 bg-white"></div><button onclick="window.fecharLeituraQR()" class="mt-8 text-white font-bold underline">Fechar</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Chaves configuradas com sucesso
        const firebaseConfig = {
            apiKey: "AIzaSyA4jSwd-V036Xrav71Pr6J8_4Ujv0jYRc0",
            authDomain: "meu-rh-6497d.firebaseapp.com",
            projectId: "meu-rh-6497d",
            storageBucket: "meu-rh-6497d.firebasestorage.app",
            messagingSenderId: "241484187493",
            appId: "1:241484187493:web:02dad9d531229f21a5c38c"
        }; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "PDA"); 

        let tipoAtual = "Retirada";
        let pdaAtual = "";
        let cacheRegistros = [];

        window.selecionarTipo = (t) => {
            tipoAtual = t;
            document.getElementById('btn-retirada').className = t === 'Retirada' ? 'flex-1 py-2 rounded-lg font-bold bg-white text-indigo-600 shadow-sm' : 'flex-1 py-2 rounded-lg font-bold text-slate-500';
            document.getElementById('btn-devolucao').className = t === 'Devolução' ? 'flex-1 py-2 rounded-lg font-bold bg-white text-indigo-600 shadow-sm' : 'flex-1 py-2 rounded-lg font-bold text-slate-500';
        };

        window.iniciarLeituraQR = () => {
            document.getElementById('qr-reader-overlay').style.display = 'flex';
            const scanner = new Html5Qrcode("qr-reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (t) => {
                pdaAtual = t;
                document.getElementById('pda-selecionado').innerText = "PDA: " + t;
                window.fecharLeituraQR();
                scanner.stop().catch(() => {});
            });
        };

        window.fecharLeituraQR = () => document.getElementById('qr-reader-overlay').style.display = 'none';

        window.enviarDados = async () => {
            const nome = document.getElementById('nome').value;
            if(!nome || !pdaAtual) return alert("Preencha o nome e leia o QR Code!");
            await addDoc(colRef, { nome, pda: pdaAtual, tipo: tipoAtual, data: new Date().toLocaleDateString(), hora: new Date().toLocaleTimeString(), ts: Date.now() });
            alert("Registrado com sucesso!");
        };

        window.abrirAdmin = () => {
            const senha = prompt("Senha Admin:");
            if(senha === "JT@2026") {
                document.getElementById('view-registro').classList.add('hide');
                document.getElementById('view-dashboard').classList.remove('hide');
                onSnapshot(colRef, (snap) => {
                    cacheRegistros = [];
                    snap.forEach(d => cacheRegistros.push(d.data()));
                    cacheRegistros.sort((a,b) => b.ts - a.ts);
                    window.renderizarTabela();
                    window.atualizarEstatisticas();
                });
            }
        };

        window.atualizarEstatisticas = () => {
            const hoje = new Date().toLocaleDateString();
            document.getElementById('stat-total').innerText = cacheRegistros.filter(r => r.data === hoje).length;
            document.getElementById('stat-retiradas').innerText = cacheRegistros.filter(r => r.data === hoje && r.tipo === 'Retirada').length;
            document.getElementById('stat-devolucoes').innerText = cacheRegistros.filter(r => r.data === hoje && r.tipo === 'Devolução').length;
            
            const map = {};
            cacheRegistros.forEach(r => { if(!map[r.pda]) map[r.pda] = r; });
            document.getElementById('stat-pendentes').innerText = Object.values(map).filter(r => r.tipo === 'Retirada').length;
        };

        window.renderizarTabela = () => {
            const tbody = document.getElementById('tabela-corpo');
            const filtro = document.getElementById('filtro').value;
            tbody.innerHTML = "";
            let dados = cacheRegistros;
            
            if(filtro === 'hoje') dados = dados.filter(r => r.data === new Date().toLocaleDateString());
            else if(filtro === 'pendentes') {
                const map = {};
                cacheRegistros.forEach(r => { if(!map[r.pda]) map[r.pda] = r; });
                dados = Object.values(map).filter(r => r.tipo === 'Retirada');
            }

            dados.forEach(r => {
                tbody.innerHTML += `<tr><td class="p-3">${r.data} ${r.hora}</td><td class="p-3">${r.nome}</td><td class="p-3 font-bold">${r.pda}</td><td class="p-3">${r.tipo}</td></tr>`;
            });
        };
        
        window.sairAdmin = () => { window.location.reload(); };
    </script>
</body>
</html>
